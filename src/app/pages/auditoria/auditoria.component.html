<div class="p-4">
  <h2 class="text-2xl font-semibold mb-4">Auditoría de Cambios</h2>

  <div class="bg-white p-4 rounded shadow mb-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
      <div>
        <label class="block text-sm text-gray-600">Desde</label>
        <input type="date" class="w-full border rounded px-2 py-1" [(ngModel)]="fechaDesde" (change)="aplicarFiltros()" />
      </div>
      <div>
        <label class="block text-sm text-gray-600">Hasta</label>
        <input type="date" class="w-full border rounded px-2 py-1" [(ngModel)]="fechaHasta" (change)="aplicarFiltros()" />
      </div>
      <div>
        <label class="block text-sm text-gray-600">Usuario</label>
        <input type="text" placeholder="Usuario" class="w-full border rounded px-2 py-1" [(ngModel)]="filtroUsuario" (input)="aplicarFiltros()" />
      </div>
      <div>
        <label class="block text-sm text-gray-600">Tabla Afectada</label>
        <input type="text" placeholder="Tabla" class="w-full border rounded px-2 py-1" [(ngModel)]="filtroTabla" (input)="aplicarFiltros()" />
      </div>
    </div>

    <div class="mt-3 flex gap-2">
      <button class="px-3 py-1 bg-blue-600 text-white rounded" (click)="aplicarFiltros()">Aplicar</button>
      <button class="px-3 py-1 bg-gray-200 rounded" (click)="resetFilters()">Limpiar</button>
    </div>
  </div>

  <div class="overflow-x-auto bg-white rounded shadow">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Fecha y Hora</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Usuario</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Acción</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Tabla Afectada</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">IP de Origen</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Valor Anterior</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Valor Nuevo</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let r of filtered">
          <td class="px-4 py-2 text-sm text-gray-700">{{ r.fecha | date: 'medium' }}</td>
          <td class="px-4 py-2 text-sm text-gray-700">{{ r.usuario }}</td>
          <td class="px-4 py-2 text-sm text-gray-700">{{ r.accion }}</td>
          <td class="px-4 py-2 text-sm text-gray-700">{{ r.tabla }}</td>
          <td class="px-4 py-2 text-sm text-gray-700">{{ r.ip_origen || '-' }}</td>
          <td class="px-4 py-2 text-sm text-gray-700 whitespace-pre-wrap max-w-xl">
            <pre class="text-xs bg-gray-100 p-2 rounded overflow-auto">{{ pretty(r.valor_anterior) }}</pre>
          </td>
          <td class="px-4 py-2 text-sm text-gray-700 whitespace-pre-wrap max-w-xl">
            <pre class="text-xs bg-gray-100 p-2 rounded overflow-auto">{{ pretty(r.valor_nuevo) }}</pre>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td class="px-4 py-6 text-center text-sm text-gray-500" colspan="7">No hay registros</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
