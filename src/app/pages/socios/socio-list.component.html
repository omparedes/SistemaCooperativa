<div class="p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-xl font-semibold mb-4">Listado de Socios</h2>

  <input
    type="text"
    placeholder="Buscar por DNI, nombres o apellidos..."
    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    [(ngModel)]="terminoBusqueda"
    (input)="filtrarSocios()"
  />

  <table class="min-w-full divide-y divide-gray-200 mt-4">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">DNI</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombres</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Apellidos</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr *ngFor="let socio of sociosFiltrados">
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ socio.dni }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ socio.nombres }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ socio.apellidos }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm">
          <span [ngClass]="socio.estado === 'Activo' ? 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800' : 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800'">
            {{ socio.estado }}
          </span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm">
          <button class="mr-2 px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">Editar</button>
          <a [routerLink]="['/socios', socio.socio_id]" class="px-3 py-1 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">Ver</a>
        </td>
      </tr>
      <tr *ngIf="sociosFiltrados.length === 0">
        <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">No se encontraron resultados.</td>
      </tr>
    </tbody>
  </table>
</div>
