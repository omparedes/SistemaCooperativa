<app-page-breadcrumb pageTitle="Usuario" />
<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-7">
    Datos de Usuario
  </h3>

  @if (cargando()) {
    <div class="animate-pulse">
      <div class="flex items-center gap-6">
        <div class="w-24 h-24 rounded-full bg-gray-200 dark:bg-gray-700"></div>
        <div class="space-y-2">
          <div class="h-5 w-48 bg-gray-200 dark:bg-gray-700 rounded"></div>
          <div class="h-4 w-56 bg-gray-200 dark:bg-gray-700 rounded"></div>
          <div class="h-4 w-32 bg-gray-200 dark:bg-gray-700 rounded"></div>
        </div>
      </div>
      <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="p-3 border border-gray-200 dark:border-gray-700 rounded">
          <div class="h-3 w-28 bg-gray-200 dark:bg-gray-700 rounded mb-2"></div>
          <div class="h-7 w-36 bg-gray-200 dark:bg-gray-700 rounded"></div>
        </div>
        <div class="p-3 border border-gray-200 dark:border-gray-700 rounded">
          <div class="h-3 w-28 bg-gray-200 dark:bg-gray-700 rounded mb-2"></div>
          <div class="h-7 w-36 bg-gray-200 dark:bg-gray-700 rounded"></div>
        </div>
        <div class="p-3 border border-gray-200 dark:border-gray-700 rounded">
          <div class="h-3 w-28 bg-gray-200 dark:bg-gray-700 rounded mb-2"></div>
          <div class="h-7 w-36 bg-gray-200 dark:bg-gray-700 rounded"></div>
        </div>
      </div>
    </div>
  } @else if (errorMsg()) {
    <div class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">
      {{ errorMsg() }}
    </div>
  } @else {
    <div class="flex items-center gap-6">
      <div
        class="w-24 h-24 rounded-full bg-blue-600 dark:bg-blue-500 flex items-center justify-center text-white text-2xl font-bold"
        aria-hidden="true"
      >
        {{ inicial() }}
      </div>

      <div>
        <div class="text-lg font-semibold text-gray-800 dark:text-white">{{ nombreDisplay() }}</div>
        <div class="text-sm text-gray-500 dark:text-gray-400">{{ email() }}</div>
        <div class="text-sm text-gray-500 dark:text-gray-400">Rol: {{ rol() }}</div>
      </div>
    </div>

    <dl class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="p-3 border border-gray-200 dark:border-gray-700 rounded dark:bg-gray-800/30" role="group" aria-label="Recaudación Hoy">
        <dt class="text-xs text-gray-500 dark:text-gray-400">Recaudación Hoy</dt>
        <dd class="text-xl font-semibold text-gray-800 dark:text-white">{{ fmtSoles(recaudacionHoy()) }}</dd>
      </div>
      <div class="p-3 border border-gray-200 dark:border-gray-700 rounded dark:bg-gray-800/30" role="group" aria-label="Gastos Mes">
        <dt class="text-xs text-gray-500 dark:text-gray-400">Gastos Mes</dt>
        <dd class="text-xl font-semibold text-gray-800 dark:text-white">{{ fmtSoles(gastosMes()) }}</dd>
      </div>
      <div class="p-3 border border-gray-200 dark:border-gray-700 rounded dark:bg-gray-800/30" role="group" aria-label="Saldo Bancos">
        <dt class="text-xs text-gray-500 dark:text-gray-400">Saldo Bancos (mes)</dt>
        <dd class="text-xl font-semibold text-gray-800 dark:text-white">{{ fmtSoles(saldoBancos()) }}</dd>
      </div>
    </dl>
  }
</div>
